<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Форма реєстрації</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Форма реєстрації</h2>

    <form>
      <p>  <label for="firstName">Ім'я:</label>
        <input type="text" id="firstName">

      <p>  <label for="lastName">Прізвище:</label>
        <input type="text" id="lastName">

      <p> <label for="email">Електронна пошта:</label>
        <input type="email" id="email">

      <p>  <label for="password">Пароль:</label>
        <input type="password" id="password">

      <p>  <label for="confirmPassword">Підтвердження пароля:</label>
        <input type="password" id="confirmPassword">

      <p>  <label for="age">Вік:</label>
        <input type="number" id="age" min="1" max="100">

      <p>  <label for="gender">Стать:</label>
        <select id="gender">
            <option value="male">Чоловіча</option>
            <option value="female">Жіноча</option>
            <option value="other">Інша</option>
        </select>

      <p>  <label for="terms" class="checkbox-label">
            Я погоджуюсь з умовами використання
            <input type="checkbox" id="terms">
        </label>

     <p>   <button type="submit">Зареєструватися</button>
    </form>

</body>
</html>
